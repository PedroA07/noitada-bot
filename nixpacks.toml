[phases.setup]
nixPkgs = ["ffmpeg", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "python3.11 -m pip install yt-dlp --break-system-packages || pip3 install yt-dlp || pip install yt-dlp",
  "npm install"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node dist/bot.js"